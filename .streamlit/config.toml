# .streamlit/config.toml ‚Äî LedgerGate-Agent UI theme
#
# Design intent:
#   A deep navy‚Üíelectric blue‚Üínear-white gradient runs as a fixed CSS
#   background on the outer app container (injected via theme.py).  All
#   actual content ‚Äî cards, tables, forms, metrics ‚Äî sits on solid
#   near-white (#FAFBFF) card surfaces with a soft shadow so the gradient
#   reads as ambient depth, never as the surface text sits on.
#
#   The most saturated part of the gradient is reserved for the hero band
#   behind each page title (h1) so rich colour appears where there is no
#   dense data to read through.
#
# Palette:
#   Gradient stops  #050B1A (deep navy) ‚Üí #1E5FD9 (electric blue) ‚Üí #F0F4FF (near-white)
#   Card surface    #FAFBFF  ‚Äî primary content background
#   Page bg         #F0F4FF  ‚Äî lightest gradient stop, shown where no card overlaps
#   Sidebar bg      #0D1B3E  ‚Äî dark navy; sourced from the darkest gradient stop
#   Text            #0D1B3E  ‚Äî dark navy on light surfaces (~13:1 on #FAFBFF, WCAG AAA)
#   Primary accent  #1E5FD9  ‚Äî electric blue (matches mid-gradient) on interactive
#                              elements: buttons, sliders, links, checkbox ticks
#
# Contrast audit (WCAG):
#   #0D1B3E on #FAFBFF ‚Üí ~13.8:1  ‚úì AAA (normal and large text)
#   #0D1B3E on #F0F4FF ‚Üí ~12.7:1  ‚úì AAA
#   #FFFFFF on #1E5FD9 ‚Üí  ~4.7:1  ‚úì AA  (button/badge text on blue)
#   #FFFFFF on #050B1A ‚Üí ~19.2:1  ‚úì AAA (sidebar text on deep navy)
#
# Badge pills (defined in ui/components/badges.py) carry their own
# background + white text and are self-contained; they are not affected
# by this config change.

[theme]
base                     = "light"
backgroundColor          = "#F0F4FF"
secondaryBackgroundColor = "#FAFBFF"
primaryColor             = "#1E5FD9"
textColor                = "#0D1B3E"
